<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Vaga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Verificação de Elegibilidade</h2>
        <form id="form-vaga">
            <div class="input-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" required>
            </div>
            
            <div class="input-group">
                <label for="idade">Idade:</label>
                <input type="number" id="idade" min="0" required>
            </div>
            
            <div class="input-group">
                <label for="altura">Altura (ex: 1.75):</label>
                <input type="text" id="altura" placeholder="1,70" required>
            </div>
            
            <button type="submit">Verificar Vaga</button>
        </form>
        
        <div id="resultado" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
